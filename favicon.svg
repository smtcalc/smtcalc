<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>

  <!-- Stencil aperture grid: 3x3 holes, representing a stencil -->
  <!-- Orange filled squares = open apertures -->
  <!-- Top row -->
  <rect x="4"  y="4"  width="7" height="7" rx="1" fill="#f5a623"/>
  <rect x="13" y="4"  width="7" height="7" rx="1" fill="#f5a623" opacity="0.4"/>
  <rect x="22" y="4"  width="6" height="7" rx="1" fill="#f5a623"/>

  <!-- Middle row -->
  <rect x="4"  y="13" width="7" height="7" rx="1" fill="#f5a623" opacity="0.4"/>
  <rect x="13" y="13" width="7" height="7" rx="1" fill="#f5a623"/>
  <rect x="22" y="13" width="6" height="7" rx="1" fill="#f5a623" opacity="0.4"/>

  <!-- Bottom row -->
  <rect x="4"  y="22" width="7" height="6" rx="1" fill="#f5a623"/>
  <rect x="13" y="22" width="7" height="6" rx="1" fill="#f5a623" opacity="0.4"/>
  <rect x="22" y="22" width="6" height="6" rx="1" fill="#f5a623"/>
</svg>
